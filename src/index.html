<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' theme:; style-src 'self' 'unsafe-inline' theme:; script-src 'self'; font-src 'self' theme: data:; img-src 'self' theme: data:;">
  <title>mini</title>
  <link rel="stylesheet" href="styles.css">
  <style id="theme-fonts"></style>
  <style id="theme-source-css"></style>
  <style id="theme-editor-css"></style>
</head>
<body>
  <div class="workspace">
    <aside id="sidebar" class="sidebar" hidden>
      <ul id="sidebar-list" class="sidebar-list"></ul>
      <div id="sidebar-resizer" class="sidebar-resizer" aria-hidden="true"></div>
    </aside>
    <div class="app" data-mode="source">
    <header class="titlebar">
      <span class="title" id="doc-title">untitled.md</span>
      <span class="dirty-dot" id="dirty-dot"></span>
    </header>

    <main class="panes">
      <span class="line-info" id="line-info"></span>
      <div id="source-host" class="pane source"></div>
      <div id="editor"
           class="pane editor"
           contenteditable="true"
           spellcheck="false"
           hidden></div>
      <aside id="find-panel" class="find-panel" hidden>
        <input id="find-input" class="find-input" type="text" placeholder="Find" spellcheck="false"/>
        <input id="find-replace" class="find-replace" type="text" placeholder="Replace" spellcheck="false"/>
        <div class="find-row find-row-top">
          <span id="find-counter" class="find-counter">0/0</span>
          <button type="button" id="find-prev"  class="find-btn-icon" title="Previous (⇧Enter)" aria-label="Previous match">▲</button>
          <button type="button" id="find-next"  class="find-btn-icon" title="Next (Enter)"      aria-label="Next match">▼</button>
          <button type="button" id="find-close" class="find-btn-icon" title="Close (Esc)"        aria-label="Close find">×</button>
        </div>
        <div class="find-row find-row-bottom">
          <button type="button" id="find-case"          class="find-toggle" title="Match case">Aa</button>
          <button type="button" id="find-word"          class="find-toggle" title="Whole word">Wd</button>
          <button type="button" id="find-select-all"    class="find-btn"    title="Select all matches">Select</button>
          <button type="button" id="find-replace-next"  class="find-btn"    title="Replace next match">Replace</button>
          <button type="button" id="find-replace-all"   class="find-btn"    title="Replace all matches">All</button>
        </div>
      </aside>
    </main>
    </div>
  </div>

  <footer class="toolbar">
      <div class="tools">
        <button type="button" class="tool-btn" data-cmd="view" title="Toggle view">
          <span class="ico">⇄</span><span class="kbd">⌘M</span>
        </button>
        <span class="sep"></span>
        <button type="button" class="tool-btn" data-cmd="header" title="Cycle header">
          <span class="ico"><b>H</b></span><span class="kbd">⌘H</span>
        </button>
        <button type="button" class="tool-btn" data-cmd="numberHeader" title="Cycle header with section number">
          <span class="ico"><b>H</b><span class="ico-sub">1.</span></span><span class="kbd">⌘⇧H</span>
        </button>
        <span class="sep"></span>
        <button type="button" class="tool-btn" data-cmd="bold" title="Bold">
          <span class="ico"><b>B</b></span><span class="kbd">⌘B</span>
        </button>
        <button type="button" class="tool-btn" data-cmd="italic" title="Italic">
          <span class="ico"><svg viewBox="0 0 14 14" width="11" height="11" aria-hidden="true">
            <line x1="6" y1="3" x2="11" y2="3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="9" y1="3" x2="6" y2="11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="4" y1="11" x2="9" y2="11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg></span><span class="kbd">⌘I</span>
        </button>
        <button type="button" class="tool-btn" data-cmd="underline" title="Underline">
          <span class="ico"><u>U</u></span><span class="kbd">⌘U</span>
        </button>
        <span class="sep"></span>
        <button type="button" class="tool-btn" data-cmd="ul" title="Bullet list">
          <span class="ico"><svg viewBox="0 0 16 14" width="16" height="14" aria-hidden="true">
            <circle cx="2" cy="3" r="1.2" fill="currentColor"/>
            <rect x="5.5" y="2.4" width="9" height="1.2" rx="0.6" fill="currentColor"/>
            <circle cx="2" cy="7" r="1.2" fill="currentColor"/>
            <rect x="5.5" y="6.4" width="9" height="1.2" rx="0.6" fill="currentColor"/>
            <circle cx="2" cy="11" r="1.2" fill="currentColor"/>
            <rect x="5.5" y="10.4" width="9" height="1.2" rx="0.6" fill="currentColor"/>
          </svg></span><span class="kbd">⌘L</span>
        </button>
        <button type="button" class="tool-btn" data-cmd="ol" title="Numbered list">
          <span class="ico"><svg viewBox="0 0 16 14" width="16" height="14" aria-hidden="true">
            <text x="0" y="4.4" font-size="4" font-family="-apple-system, system-ui, sans-serif" font-weight="700" fill="currentColor">1</text>
            <rect x="5.5" y="2.4" width="9" height="1.2" rx="0.6" fill="currentColor"/>
            <text x="0" y="8.4" font-size="4" font-family="-apple-system, system-ui, sans-serif" font-weight="700" fill="currentColor">2</text>
            <rect x="5.5" y="6.4" width="9" height="1.2" rx="0.6" fill="currentColor"/>
            <text x="0" y="12.4" font-size="4" font-family="-apple-system, system-ui, sans-serif" font-weight="700" fill="currentColor">3</text>
            <rect x="5.5" y="10.4" width="9" height="1.2" rx="0.6" fill="currentColor"/>
          </svg></span><span class="kbd">⌘K</span>
        </button>
        <span class="sep"></span>
        <button type="button" class="tool-btn" data-cmd="quote" title="Blockquote">
          <span class="ico"><svg viewBox="0 0 16 14" width="16" height="14" aria-hidden="true">
            <rect x="2"   y="2.5" width="1.6" height="9" rx="0.8" fill="currentColor"/>
            <rect x="5.5" y="3"   width="9"   height="1.2" rx="0.6" fill="currentColor"/>
            <rect x="5.5" y="6.4" width="7"   height="1.2" rx="0.6" fill="currentColor"/>
            <rect x="5.5" y="9.8" width="8"   height="1.2" rx="0.6" fill="currentColor"/>
          </svg></span><span class="kbd">⌘D</span>
        </button>
        <button type="button" class="tool-btn" data-cmd="code" title="Code">
          <span class="ico">&lt;/&gt;</span><span class="kbd">⌘R</span>
        </button>
        <span class="sep"></span>
        <button type="button" class="tool-btn" data-cmd="hr" title="Horizontal rule (toggle)">
          <span class="ico"><svg viewBox="0 0 16 12" width="16" height="12" aria-hidden="true">
            <line x1="2" y1="3"  x2="14" y2="3"  stroke="currentColor" stroke-width="0.7" opacity="0.45"/>
            <line x1="2" y1="6"  x2="14" y2="6"  stroke="currentColor" stroke-width="1.6"/>
            <line x1="2" y1="9"  x2="14" y2="9"  stroke="currentColor" stroke-width="0.7" opacity="0.45"/>
          </svg></span><span class="kbd">⌘P</span>
        </button>
        <span class="sep"></span>
        <button type="button" class="tool-btn" data-cmd="table" title="Table — new or add row">
          <span class="ico"><svg viewBox="0 0 18 14" width="18" height="14" aria-hidden="true">
            <rect x="1.5" y="1.5" width="9" height="3" fill="none"          stroke="currentColor" stroke-width="0.8"/>
            <rect x="1.5" y="4.5" width="9" height="3" fill="none"          stroke="currentColor" stroke-width="0.8"/>
            <rect x="1.5" y="7.5" width="9" height="3" fill="currentColor" stroke="currentColor" stroke-width="0.8"/>
            <line x1="13" y1="9" x2="17" y2="9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="15" y1="7" x2="15" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg></span><span class="kbd">⌘T</span>
        </button>
        <button type="button" class="tool-btn" data-cmd="deleteRow" title="Delete current row">
          <span class="ico"><svg viewBox="0 0 18 14" width="18" height="14" aria-hidden="true">
            <rect x="1.5" y="1.5" width="9" height="3" fill="none"          stroke="currentColor" stroke-width="0.8"/>
            <rect x="1.5" y="4.5" width="9" height="3" fill="none"          stroke="currentColor" stroke-width="0.8"/>
            <rect x="1.5" y="7.5" width="9" height="3" fill="currentColor" stroke="currentColor" stroke-width="0.8"/>
            <line x1="13" y1="9" x2="17" y2="9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg></span><span class="kbd">⌘⇧T</span>
        </button>
        <button type="button" class="tool-btn" data-cmd="addCol" title="Add column">
          <span class="ico"><svg viewBox="0 0 18 14" width="18" height="14" aria-hidden="true">
            <rect x="1.5" y="1.5" width="3" height="9" fill="none"          stroke="currentColor" stroke-width="0.8"/>
            <rect x="4.5" y="1.5" width="3" height="9" fill="none"          stroke="currentColor" stroke-width="0.8"/>
            <rect x="7.5" y="1.5" width="3" height="9" fill="currentColor" stroke="currentColor" stroke-width="0.8"/>
            <line x1="13" y1="6" x2="17" y2="6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="15" y1="4" x2="15" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg></span><span class="kbd">⌘G</span>
        </button>
        <button type="button" class="tool-btn" data-cmd="removeCol" title="Remove column">
          <span class="ico"><svg viewBox="0 0 18 14" width="18" height="14" aria-hidden="true">
            <rect x="1.5" y="1.5" width="3" height="9" fill="none"          stroke="currentColor" stroke-width="0.8"/>
            <rect x="4.5" y="1.5" width="3" height="9" fill="none"          stroke="currentColor" stroke-width="0.8"/>
            <rect x="7.5" y="1.5" width="3" height="9" fill="currentColor" stroke="currentColor" stroke-width="0.8"/>
            <line x1="13" y1="6" x2="17" y2="6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg></span><span class="kbd">⌘⇧G</span>
        </button>
      </div>
      <button class="toolbar-collapse" id="toolbar-collapse" title="Collapse toolbar" aria-label="Collapse toolbar">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <rect x="3" y="5" width="18" height="14" rx="2" stroke-width="1.5"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 5v14"/>
          <rect x="15" y="5" width="6" height="14" fill="currentColor" stroke="none"/>
        </svg>
      </button>
    </footer>
    <div class="progress" title="Reading position">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  <button class="toolbar-fab" id="toolbar-fab" title="Show toolbar" aria-label="Show toolbar">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
      <rect x="3" y="5" width="18" height="14" rx="2" stroke-width="1.5"/>
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 5v14"/>
      <rect x="15" y="5" width="6" height="14" fill="currentColor" stroke="none"/>
    </svg>
  </button>

  <script src="renderer.bundle.js"></script>
</body>
</html>
